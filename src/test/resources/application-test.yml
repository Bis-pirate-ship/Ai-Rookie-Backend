spring:
  datasource:
    url: jdbc:h2:mem:airookie-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long
  access-token-validity-seconds: 1800
  refresh-token-validity-seconds: 604800

